<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hlasování – Anketa</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20100%20100%22%3E%3Ctext%20y=%2280%22%20font-size=%2280%22%3E🗳️%3C/text%3E%3C/svg%3E">

    <!-- Google Analytics removed to eliminate unused JS and improve performance -->
</head>
<body>
    <div class="container">
        <h1>🗳️ Anketa</h1>
        <div class="card">
            <p class="greeting">👋 Ahoj, <strong>{{ username }}</strong>!</p>
            <h2>{{ question }}</h2>

            <form action="/vote" method="POST">
                <div class="options">
                    {% for option in options %}
                    <label class="option-label">
                        <input type="radio" name="choice" value="{{ option }}" required>
                        <span class="option-text">{{ option }}</span>
                    </label>
                    {% endfor %}
                </div>
                <button type="submit" class="btn btn-primary">✅ Hlasovat</button>
            </form>
        </div>
        <a href="/results" class="link">📊 Zobrazit výsledky bez hlasování</a>
        <a href="/about" class="link" style="margin-left:1em;">ℹ️ O anketě</a>
    </div>
</body>
</html>
